<!DOCTYPE html><html>
<head>
    <title>Add Employee</title><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Poppins', sans-serif;
    }

    body {
        height: 100vh;
        background: url("https://images.unsplash.com/photo-1497366216548-37526070297c") no-repeat center center/cover;
        /* display: flex;
        justify-content: center;
        align-items: center; */
    }

    .container {
        background: rgba(255,255,255,0.1);
        backdrop-filter: blur(15px);
        padding: 40px;
        border-radius: 15px;
        width: 380px;
        color: white;
        box-shadow: 0 0 25px rgba(0,0,0,0.3);
        width: 380px;
        margin: 40px auto;
        animation: fadeIn 0.6s ease;
    }

    @keyframes fadeIn{
    from{opacity:0; transform:translateY(-20px);}
    to{opacity:1; transform:translateY(0);}
}

    .container h2 {
        text-align: center;
        margin-bottom: 20px;
        font-weight: 600;
    }

    .container input {
        width: 100%;
        padding: 12px;
        margin: 10px 0;
        border: none;
        border-radius: 8px;
        outline: none;
    }

    .container button {
        width: 100%;
        padding: 12px;
        background: #007BFF;
        border: none;
        border-radius: 8px;
        color: white;
        font-weight: 600;
        cursor: pointer;
        transition: 0.3s;
    }

    .container button:hover {
        background: #0056b3;
    }
        
        
        .container {
            padding: 40px;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
        }

        .card i {
            font-size: 30px;
            color: #007BFF;
        }

        .card h2 {
            margin: 10px 0;
            font-size: 2em;
        }

        .card p {
            font-weight: 600;
            color: #555;
        }
        nav {
            background: #65a6eb;
            padding: 15px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-links {
            list-style: none;
            display: flex;        /* This makes items horizontal */
            gap: 20px;
            margin: 0;
            padding: 0;
            
        }

        .nav-links li {
            display: inline;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            font-weight: 500;
        }

        .nav-links a:hover {
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            .cards {
                grid-template-columns: 1fr 1fr;
            }
            nav {
                flex-direction: column;
                gap: 10px;
            }
        }

</style>

</head><body>
<nav>
    <div class="logo">HR PROMOTION PREDICTION SYSTEM</div>

    <ul class="nav-links">
        <li><a href="/dashboard"><i class="fas fa-arrow-left"></i> Return to Dashboard</a></li>
    </ul>
</nav>
    
    <div class="container">

    <h2>Add Employee</h2>

    <form method="POST" action="/add_employee">
        {% if error %}
        <div style="background:#ffe6e6; color:#cc0000; padding:10px; border-radius:5px; margin-bottom:15px;">
            {{ error }}
        </div>
    {% endif %}

    {% if success %}
        <div style="background:#e6ffe6; color:#009900; padding:10px; border-radius:5px; margin-bottom:15px;">
            {{ success }}
        </div>
    {% endif %}

    

        <input type="text" name="emp_id" placeholder="Employee ID" required>

        <input type="text" name="emp_name" placeholder="Employee Name" required>

        <input type="text" name="department" placeholder="Department" required>

        <input type="text" name="education" placeholder="Education" required>

        <input type="text" name="gender" placeholder="Gender" required>

        <input type="number" name="age" placeholder="Age" min="18" max="70" onkeydown="if(event.key==='-'||event.key==='+'||event.key==='e') event.preventDefault()" required>
        <button type="submit">Add Employee</button>


    </form>

</div>

</body>
</html>
