<!DOCTYPE html>
<html>
<head>
<title>Reports</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f4f6f9;
    margin:0;
    padding:0;
}

.container{
    width:80%;
    margin:auto;
    text-align:center;
    margin-top:80px;
}

h1{
    margin-bottom:40px;
    color:#333;
}

.report-box{
    display:flex;
    justify-content:center;
    gap:40px;
}

.card{
    width:250px;
    height:150px;
    background:white;
    border-radius:10px;
    box-shadow:0px 4px 10px rgba(0,0,0,0.1);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:20px;
    font-weight:bold;
    color:#444;
    text-decoration:none;
    transition:0.3s;
}

.card:hover{
    background:#f31f82;
    color:white;
    transform:scale(1.05);
}

.back-btn{
    margin-top:40px;
}

button{
    padding:10px 20px;
    border:none;
    background:#333;
    color:white;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#555;
}
body {
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', sans-serif;

    background: url("https://images.unsplash.com/photo-1556761175-4b46a572b786") no-repeat center center fixed;
    background-size: cover;
}

</style>
</head>

<body>

<div class="container">

<h1>Reports</h1>

<div class="report-box">

<a href="/employee_reports" class="card">
Employee Reports
</a>

<a href="/prediction_reports" class="card">
Prediction Reports
</a>

</div>

<div class="back-btn">

<a href="/dashboard">
<button>Back to Dashboard</button>
</a>

</div>

</div>

</body>
</html>
